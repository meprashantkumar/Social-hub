# SocialHub — Nginx site config.
# Serves the built React client and reverse-proxies /api to the Node API on :4000.
#
# After enabling this site, run:
#   sudo certbot --nginx -d socialhub.smalltowncoder.in
# Certbot rewrites this file in place to add the TLS (443) server block and an
# http -> https redirect, so you don't hand-write the SSL bits.

server {
    listen 80;
    listen [::]:80;
    server_name socialhub.smalltowncoder.in;

    # Built client — copy client/dist here after `npm run build` (see DEPLOY.md).
    root /var/www/socialhub;
    index index.html;

    # Uploads go browser -> Cloudinary directly; the API only receives JSON.
    client_max_body_size 2m;

    # API -> Node. Keep the /api prefix (the app mounts routes under /api/*).
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
