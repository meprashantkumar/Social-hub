# Local development infrastructure for SocialHub.
# Phase 1 only needs Postgres. RabbitMQ (+ delayed-message plugin) and Redis
# will be added in their respective phases (scheduling / caching).
services:
  postgres:
    image: postgres:17-alpine
    container_name: socialhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: socialhub
    ports:
      - "5432:5432" # LOCAL dev only — do NOT expose publicly in production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d socialhub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata: {}
